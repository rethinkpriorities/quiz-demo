AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Quiz Demo Share URL API

Parameters:
  TursoDatabaseUrl:
    Type: String
    Description: Turso database URL
    NoEcho: true
  TursoAuthToken:
    Type: String
    Description: Turso auth token
    NoEcho: true
  AnthropicApiKey:
    Type: String
    Description: Anthropic API key for AI explanation
    NoEcho: true
  NotifyEmail:
    Type: String
    Description: Email address to receive donation notifications
    Default: fund@rethinkpriorities.org
  SenderEmail:
    Type: String
    Description: Verified SES sender email address
    Default: fund@rethinkpriorities.org

Resources:
  ShareFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quiz-demo-share
      CodeUri: share/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TURSO_DATABASE_URL: !Ref TursoDatabaseUrl
          TURSO_AUTH_TOKEN: !Ref TursoAuthToken

  ShareFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ShareFunction.Arn
      Cors:
        AllowOrigins:
          - 'https://donorcompass.rethinkpriorities.org'
          - 'https://donorcompass.netlify.app'
          - 'https://rethinkpriorities.github.io'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # Permission for Function URL public access
  ShareFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ShareFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  # Additional permission required for public Function URLs
  ShareFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ShareFunction
      Action: lambda:InvokeFunction
      Principal: '*'

  ExplainFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quiz-demo-explain
      CodeUri: explain/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey

  ExplainFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt ExplainFunction.Arn
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  ExplainFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExplainFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  ExplainFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExplainFunction
      Action: lambda:InvokeFunction
      Principal: '*'

  DonateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: quiz-demo-donate
      CodeUri: donate/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TURSO_DATABASE_URL: !Ref TursoDatabaseUrl
          TURSO_AUTH_TOKEN: !Ref TursoAuthToken
          NOTIFY_EMAIL: !Ref NotifyEmail
          SENDER_EMAIL: !Ref SenderEmail
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'

  DonateFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt DonateFunction.Arn
      Cors:
        AllowOrigins:
          - 'https://donorcompass.rethinkpriorities.org'
          - 'https://donorcompass.netlify.app'
          - 'https://rethinkpriorities.github.io'
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  DonateFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DonateFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  DonateFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DonateFunction
      Action: lambda:InvokeFunction
      Principal: '*'

Outputs:
  ShareFunctionUrl:
    Description: Function URL for the Share API
    Value: !GetAtt ShareFunctionUrl.FunctionUrl
  ShareFunctionArn:
    Description: ARN of the Share function
    Value: !GetAtt ShareFunction.Arn
  ExplainFunctionUrl:
    Description: Function URL for the Explain API
    Value: !GetAtt ExplainFunctionUrl.FunctionUrl
  ExplainFunctionArn:
    Description: ARN of the Explain function
    Value: !GetAtt ExplainFunction.Arn
  DonateFunctionUrl:
    Description: Function URL for the Donate API
    Value: !GetAtt DonateFunctionUrl.FunctionUrl
  DonateFunctionArn:
    Description: ARN of the Donate function
    Value: !GetAtt DonateFunction.Arn
